# Client vhost (Apache) — serves the static React build at pwise.sixpent.com.
# Install at: /etc/apache2/sites-available/pwise.sixpent.com.conf
# (HTTPS / :443 is added later via the Cloudflare Origin Certificate.)
<VirtualHost *:80>
    ServerName pwise.sixpent.com
    DocumentRoot /var/www/pwise

    <Directory /var/www/pwise>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        # SPA fallback: any path that isn't a real file → index.html
        FallbackResource /index.html
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/pwise_error.log
    CustomLog ${APACHE_LOG_DIR}/pwise_access.log combined
</VirtualHost>
