# API vhost (Apache) — reverse-proxies to the Node server.
# Requires the proxy modules:  sudo a2enmod proxy proxy_http
# Install at: /etc/apache2/sites-available/pwise-api.sixpent.com.conf
# (HTTPS / :443 is added later via the Cloudflare Origin Certificate.)
<VirtualHost *:80>
    ServerName pwise-api.sixpent.com

    ProxyPreserveHost On
    # the proxy target port must match PORT in /var/www/pwise-api/.env
    ProxyPass        / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    ErrorLog  ${APACHE_LOG_DIR}/pwise-api_error.log
    CustomLog ${APACHE_LOG_DIR}/pwise-api_access.log combined
</VirtualHost>
