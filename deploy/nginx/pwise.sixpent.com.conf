# Client vhost — serves the static React build (pwise.sixpent.com).
# Install at: /etc/nginx/sites-available/pwise.sixpent.com
# (HTTPS / port 443 is added later via the Cloudflare Origin Certificate.)

server {
    listen 80;
    listen [::]:80;
    server_name pwise.sixpent.com;

    root /var/www/pwise;          # where you uploaded the contents of client/dist
    index index.html;

    # Vite content-hashes every file in /assets (the hash in the filename changes
    # whenever the contents change), so these are safe to cache forever and never
    # revalidate. This is what stops the JS/CSS bundle re-downloading every visit.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # index.html is the one file that must stay fresh — it points at the hashed
    # assets above. Don't hard-cache it; let the browser revalidate via ETag so a
    # new build is picked up immediately (just a tiny 304 when nothing changed).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page app: serve the requested file if it exists,
    # otherwise hand back index.html so client-side routes work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
