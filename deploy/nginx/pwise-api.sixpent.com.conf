# API vhost — reverse-proxies to the Node server (pwise-api.sixpent.com).
# Install at: /etc/nginx/sites-available/pwise-api.sixpent.com
# (HTTPS / port 443 is added later via the Cloudflare Origin Certificate.)

server {
    listen 80;
    listen [::]:80;
    server_name pwise-api.sixpent.com;

    client_max_body_size 5m;      # API handles JSON only; media uploads go to S3 directly

    location / {
        proxy_pass http://127.0.0.1:5000;     # MUST match PORT in /var/www/pwise-api/.env
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
